- name: Aegis - Provision and Deploy Cybersuite
  hosts: web
  become: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required system packages
      apt:
        pkg:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - gnupg
          - git
          - certbot 
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        state: present

    - name: Install Docker and Docker Compose
      apt:
        pkg:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure Docker service is running and enabled
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Create app deployment directory
      file:
        path: /opt/cybersuite
        state: directory
        mode: '0755'

    - name: Clone the Cybersuite repository
      git:
        repo: 'https://github.com/ikeshav26/cybersec_.git'
        dest: /opt/cybersuite
        force: yes
        version: main


    - name: Copy root .env file to server
      copy:
        src: ../.env
        dest: /opt/cybersuite/.env
        mode: '0600'

    - name: Copy api-gateway .env.prod to server
      copy:
        src: ../services/api-gateway/.env.prod
        dest: /opt/cybersuite/services/api-gateway/.env.prod
        mode: '0600'

    - name: Copy auth-service .env.prod to server
      copy:
        src: ../services/auth-service/.env.prod
        dest: /opt/cybersuite/services/auth-service/.env.prod
        mode: '0600'

    - name: Copy app-integration-service .env.prod to server
      copy:
        src: ../services/app-integration-service/.env.prod
        dest: /opt/cybersuite/services/app-integration-service/.env.prod
        mode: '0600'

    - name: Copy secure-bot .env.prod to server
      copy:
        src: ../services/secure-bot/.env.prod
        dest: /opt/cybersuite/services/secure-bot/.env.prod
        mode: '0600'

    - name: Stop existing Docker Compose services (if any are running)
      shell: docker compose down
      args:
        chdir: /opt/cybersuite
      failed_when: false 

    - name: Build and start Docker Compose services
      shell: docker compose up -d --build
      args:
        chdir: /opt/cybersuite